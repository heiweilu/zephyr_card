# water_turret prj.conf — K210 + ESP32-S3 自动追踪水枪

CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_GPIO=y
CONFIG_GPIO_INIT_PRIORITY=40

CONFIG_PWM=y

# ── UART (K210 通信) ──
CONFIG_UART_INTERRUPT_DRIVEN=y

# ── Shell (运行时调参) ──
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# ── Stack ──
CONFIG_MAIN_STACK_SIZE=4096
